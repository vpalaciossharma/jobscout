name: Job Scout Daily Alert

on:
  schedule:
    # Runs at 14:00 UTC daily = 7:00 AM PDT (UTC-7)
    # Note: during PST (Nov–Mar) this fires at 6:00 AM instead of 7:00 AM
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allows you to trigger a manual run from the GitHub Actions tab

jobs:
  run-job-scout:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config from secrets
        run: |
          cat > config.json << 'EOF'
          {
            "rapidapi_key": "${{ secrets.RAPIDAPI_KEY }}",
            "gmail_address": "${{ secrets.GMAIL_ADDRESS }}",
            "gmail_app_password": "${{ secrets.GMAIL_APP_PASSWORD }}",
            "recipient_email": "${{ secrets.RECIPIENT_EMAIL }}"
          }
          EOF

      - name: Run Job Scout
        run: python job_scout.py

      - name: Clean up config (remove secrets from runner)
        if: always()
        run: rm -f config.json
